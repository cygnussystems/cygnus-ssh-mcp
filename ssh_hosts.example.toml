# SSH Hosts Configuration
# Copy to ~/.mcp_ssh_hosts.toml and update with your credentials
# Secure the file: chmod 600 ~/.mcp_ssh_hosts.toml

# Minimal entry (password auth)
["user@hostname"]
password = "your_password"
port = 22

# With alias for quick access ("connect to prod")
["admin@192.168.1.100"]
password = "secret"
port = 22
alias = "prod"

# Full example with all options
["deploy@server.example.com"]
password = "your_password"
port = 22
sudo_password = "sudo_pass"
alias = "deploy"
description = "Production deployment server"

# SSH key authentication
["admin@secure.example.com"]
keyfile = "~/.ssh/id_ed25519"
port = 22
alias = "secure"

# SSH key with passphrase
["admin@encrypted.example.com"]
keyfile = "~/.ssh/id_rsa"
key_passphrase = "key_passphrase"
port = 22
sudo_password = "sudo_pass"
alias = "enc"
